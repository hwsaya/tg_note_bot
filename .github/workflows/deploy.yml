name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Push secrets to Cloudflare
        run: |
          echo "${{secrets.TELEGRAM_BOT_TOKEN}}" | npx wrangler secret put TELEGRAM_BOT_TOKEN
          echo "${{secrets.AI_API_KEY}}"         | npx wrangler secret put AI_API_KEY
          if [-n "$VISION_API_KEY"]; then
            echo "$VISION_API_KEY" | npx wrangler secret put VISION_API_KEY
          fi
          if [-n "$SPEECH_API_KEY"]; then
            echo "$SPEECH_API_KEY" | npx wrangler secret put SPEECH_API_KEY
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{secrets.CF_API_TOKEN}}
          VISION_API_KEY: ${{secrets.VISION_API_KEY}}
          SPEECH_API_KEY: ${{secrets.SPEECH_API_KEY}}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
